name: SonarQube Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sonarqube:
    runs-on: ubuntu-latest
    services:
      sonarqube:
        image: sonarqube:community
        env:
          SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: true
        ports:
          - 9000:9000
    strategy:
      matrix:
        app:
          - auth-service
          - products
          - frontend
          - analisis-vulnerabilidades
    steps:
      - uses: actions/checkout@v4

      - name: Wait for SonarQube
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:9000 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "SonarQube is ready"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 10
          done

      - name: Generate SonarQube token
        run: |
          sleep 15
          curl -s -u admin:admin -X POST "http://localhost:9000/api/users/change_password" \
            -d "login=admin&previousPassword=admin&password=admin" || true
          RESP=$(curl -s -u admin:admin -X POST "http://localhost:9000/api/user_tokens/generate" \
            -d "name=ci-token-$(date +%s)")
          echo "SONAR_TOKEN=$(echo $RESP | jq -r '.token')" >> $GITHUB_ENV

      - name: SonarQube Scan (${{ matrix.app }})
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          projectBaseDir: apps/${{ matrix.app }}
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: http://localhost:9000
