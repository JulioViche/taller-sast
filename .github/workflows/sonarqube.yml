name: SonarQube Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sonarqube:
    runs-on: [self-hosted, wsl]
    strategy:
      matrix:
        app:
          - auth-service
          - products
          - frontend
          - analisis-vulnerabilidades
    steps:
      - uses: actions/checkout@v4

      - name: Wait for SonarQube
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://sonarqube:9000 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "SonarQube is ready"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 10
          done

      - name: SonarQube Scan (${{ matrix.app }})
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          projectBaseDir: apps/${{ matrix.app }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: http://sonarqube:9000
